name: codecoverage 

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  codecoverage_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - name: Install coverage tools
      run: cargo install cargo-binutils rustfilt
    - name: Install jq
      run: sudo apt install jq
    - name: Determine coverage
      run: coverage/coverage.bash
      shell: bash
    - name: Extract line coverage percentage
      id: coverage
      run: |
        pct=$(jq '.data[0].totals.lines.percent' target/coverage/export_without_tests.json)
        printf 'pct=%.2f\n' "$pct" >> "$GITHUB_OUTPUT"
    - name: Update coverage badge gist
      if: github.ref == 'refs/heads/main'
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_TOKEN }}
        gistID: 09a90a219054946fd93359b73002ed28
        filename: someip-parse-coverage.json
        label: coverage
        message: ${{ steps.coverage.outputs.pct }}%
        valColorRange: ${{ steps.coverage.outputs.pct }}
        minColorRange: 0
        maxColorRange: 100
